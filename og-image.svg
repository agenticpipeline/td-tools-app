<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect fill="#0a0f1e" width="1200" height="630"/>
  <rect fill="none" stroke="#00d4ff" stroke-opacity="0.15" x="0" y="0" width="1200" height="630" stroke-width="4"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00d4ff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo -->
  <text x="100" y="120" font-family="monospace" font-size="32" font-weight="bold" fill="#00d4ff">TD_TOOLS</text>

  <!-- Headline -->
  <text x="100" y="250" font-family="sans-serif" font-size="64" font-weight="bold" fill="#e2e8f0">Stop Guessing.</text>
  <text x="100" y="330" font-family="sans-serif" font-size="64" font-weight="bold" fill="#00d4ff">Start Estimating.</text>

  <!-- Subhead -->
  <text x="100" y="400" font-family="sans-serif" font-size="24" fill="#94a3b8">AI-Powered Crew Estimation for Live Events</text>

  <!-- Stats bar -->
  <rect x="100" y="460" width="1000" height="1" fill="#00d4ff" opacity="0.3"/>
  <text x="100" y="510" font-family="monospace" font-size="20" fill="#00d4ff">10x FASTER</text>
  <text x="370" y="510" font-family="monospace" font-size="20" fill="#00d4ff">8+ DEPARTMENTS</text>
  <text x="680" y="510" font-family="monospace" font-size="20" fill="#00d4ff">95% ACCURACY</text>

  <!-- Footer -->
  <text x="100" y="580" font-family="sans-serif" font-size="18" fill="#94a3b8">agenticpipeline.github.io/td-tools-app</text>
  <text x="1100" y="580" font-family="sans-serif" font-size="18" fill="#94a3b8" text-anchor="end">Agentic Sales Inc</text>
</svg>
